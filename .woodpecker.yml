when:
  branch: main
  event: push

variables:
  - project_id: devbog-prod
  - region: us-central1
  - service_name: devbog-blog-front

steps:
  build-and-push:
    image: gcr.io/kaniko-project/executor:latest
    secrets: [gcp_service_account]
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    commands:
      - echo "$GCP_SERVICE_ACCOUNT" > /tmp/gcp-key.json
      - |
        /kaniko/executor \
          --context=${CI_WORKSPACE} \
          --dockerfile=Dockerfile \
          --destination=${region}-docker.pkg.dev/${project_id}/devbog-blog/devbog-front:${CI_COMMIT_SHA:0:8} \
          --destination=${region}-docker.pkg.dev/${project_id}/devbog-blog/devbog-front:latest \
          --cache=true \
          --cache-repo=${region}-docker.pkg.dev/${project_id}/devbog-blog/cache \
          --snapshot-mode=redo

  deploy:
    image: google/cloud-sdk:latest
    secrets: [gcp_service_account]
    commands:
      - echo "$GCP_SERVICE_ACCOUNT" > /tmp/gcp-key.json
      - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
      - |
        gcloud run deploy ${service_name} \
          --image=${region}-docker.pkg.dev/${project_id}/devbog-blog/devbog-front:${CI_COMMIT_SHA:0:8} \
          --region=${region} \
          --platform=managed \
          --allow-unauthenticated \
          --cpu=1 \
          --memory=512Mi \
          --concurrency=80 \
          --min-instances=0 \
          --max-instances=5 \
          --timeout=300 \
          --execution-environment=gen2 \
          --cpu-boost \
          --service-account=devbog-runner@${project_id}.iam.gserviceaccount.com
